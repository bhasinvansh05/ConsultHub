services:
  db:
    image: postgres:16-alpine #download and use the official Postgres image
    container_name: eecs3311-db
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME:-consulting_db}
      POSTGRES_USER: ${LOCAL_DB_USER:-admin}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-changeme}
    ports:
      - "${LOCAL_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER:-admin} -d ${LOCAL_DB_NAME:-consulting_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eecs3311-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SPRING_PORT:-8080}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://${LOCAL_DB_HOST:-db}:5432/${LOCAL_DB_NAME:-consulting_db}}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-${LOCAL_DB_USER:-admin}}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-${LOCAL_DB_PASSWORD:-changeme}}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DB_CHANNEL_BINDING: ${DB_CHANNEL_BINDING:-disable}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${SPRING_PORT:-8080}:${SPRING_PORT:-8080}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eecs3311-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: