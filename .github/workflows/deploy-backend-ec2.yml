name: Deploy Backend to EC2

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-backend-ec2.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/ubuntu/ConsultHub
            git fetch origin
            git checkout main
            git pull origin main

            # Deploy backend with production compose override.
            # The override disables local db dependency so backend can use Neon.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build backend
            docker image prune -f

            echo "Waiting for backend to boot..."
            max_attempts=24
            success=0
            for attempt in $(seq 1 "$max_attempts"); do
              if curl -fsS --max-time 10 http://127.0.0.1:8080/actuator/health; then
                success=1
                break
              fi
              echo "Health check attempt $attempt/$max_attempts failed; retrying in 5s..."
              sleep 5
            done

            if [ "$success" -ne 1 ]; then
              echo "Health check failed after $max_attempts attempts. Dumping backend diagnostics..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200 backend
              exit 1
            fi

            echo "Backend health check passed."
