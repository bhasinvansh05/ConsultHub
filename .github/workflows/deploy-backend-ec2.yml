name: Deploy Backend to EC2

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-backend-ec2.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/ubuntu/ConsultHub
            git fetch origin
            git checkout main
            git pull origin main

            # Deploy backend with production compose override.
            # The override disables local db dependency so backend can use Neon.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build backend
            docker image prune -f

            echo "Waiting for backend to boot..."
            sleep 15
            curl -fsS https://api-consulthub.vanshbhasin.dev/actuator/health
