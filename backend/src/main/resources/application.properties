spring.application.name=consultingplatform

# Server Configuration
server.port=${SPRING_PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Test Configuration
spring.test.database.replace=${SPRING_TEST_DATABASE_REPLACE:any}

# Security / JWT
security.jwt.secret=${JWT_SECRET:change-this}
security.jwt.expiration-ms=${JWT_EXP_MS:3600000}
security.jwt.header=Authorization
security.jwt.prefix=Bearer 

# Gemini (POST /api/agent/chat) — key from https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY:}
# Same model ids as @google/generative-ai (Node): primary; fallback if 404
gemini.model.primary=gemini-3-flash-preview
gemini.model.fallback=gemini-3.1-flash-lite-preview
